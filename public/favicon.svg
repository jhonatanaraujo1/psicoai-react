<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square in brand green -->
  <rect width="32" height="32" rx="7" fill="#2D4A38"/>
  <!-- Psi (Ψ) symbol — drawn as paths for crisp rendering at small sizes -->
  <!-- Vertical stem -->
  <rect x="14.5" y="17" width="3" height="10" rx="1" fill="#FFFFFF"/>
  <!-- Horizontal crossbar -->
  <rect x="7" y="14" width="18" height="2.5" rx="1.2" fill="#FFFFFF"/>
  <!-- Left arm -->
  <path d="M8 9 Q8 16 11 16" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" fill="none"/>
  <!-- Right arm -->
  <path d="M24 9 Q24 16 21 16" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" fill="none"/>
  <!-- Center spine top -->
  <rect x="14.5" y="5" width="3" height="12" rx="1.2" fill="#FFFFFF"/>
</svg>